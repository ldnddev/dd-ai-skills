<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Website Comparison Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon/favicon-96x96.png" />
  <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="assets/favicon/site.webmanifest" />

  <!-- ldnddev Framework: compiled stylesheet + component JS.
       Linked from the bundle root assets/ folder (style.min.css + main.min.js).
       Dark mode is driven by the framework via prefers-color-scheme.
       Detail-table column sort, aria-sort upkeep, and scroll-region keyboard
       access all come from main.min.js (dd_data_table) — not reimplemented here. -->
  <link rel="stylesheet" href="assets/css/style.min.css">
  <script src="assets/js/main.min.js" defer></script>

  <!-- Minimal shell CSS: only the dashboard bits the framework has no component
       for (skip link, summary readout, sticky rail, pill wrap). System colors
       (Canvas/CanvasText/GrayText) adapt to light/dark with no tokens. -->
  <style>
    .skip-link { position: absolute; left: .5rem; top: -3rem; z-index: 1000; padding: .4rem .75rem; background: Canvas; color: CanvasText; border: 1px solid CanvasText; }
    .skip-link:focus { top: .5rem; }
    [id] { scroll-margin-top: 1rem; }
    .app-summary { margin: 0; }
    .app-summary__row { display: flex; justify-content: space-between; gap: 1rem; padding: .4rem 0; border-bottom: 1px solid rgba(128, 128, 128, .3); }
    .app-summary__row:last-child { border-bottom: 0; }
    .app-summary dt { color: color-mix(in srgb, CanvasText 70%, Canvas); }
    .app-summary dd { margin: 0; font-weight: 600; text-align: end; overflow-wrap: anywhere; }
    .rail { position: sticky; top: 1rem; }
    @media (max-width: 920px) { .rail { position: static; } }
    .muted { color: color-mix(in srgb, CanvasText 70%, Canvas); }
    .app-pill-list { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: .25rem; }
    .app-charts { display: flex; flex-direction: column; gap: 1.25rem; }
    .app-error { border: 1px solid CanvasText; padding: .75rem 1rem; margin: 1rem 0; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }
  </style>
</head>

<body class="dd-g">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Polite live region for filter/sort/copy announcements (4.1.3). Authored
       statically and OUTSIDE any container that gets rebuilt, so it can announce
       reliably. -->
  <div id="row-status" class="visually-hidden" role="status" aria-live="polite"></div>

  <header class="dd-header dd-u-1-1">
    <div class="dd-header__top">
      <div class="dd-g">
        <div class="dd-header__logo dd-u-1-1 l-box">
          <img src="assets/imgs/logo-mini.svg" alt="" class="dd-img" />
          <h1>Website Comparison Dashboard</h1>
          <p class="muted">Generated <span id="generated-at">…</span> · homepage + direct resources only (no JS execution)</p>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content" tabindex="-1" class="dd-u-1-1">
    <div class="dd-g">
      <!-- Static landmarks/headings/labels live here so the document is
           structured before (and even if) the JS data-build runs (B2). -->
      <div class="dd-u-1-1 l-box">
        <noscript>
          <p class="app-error">This comparison dashboard needs JavaScript to render the metrics. The underlying data is available in the accompanying <code>data.json</code> file.</p>
        </noscript>
        <div id="app-error" class="app-error" role="alert" hidden></div>
      </div>

      <!-- Rail: summary readout + per-metric bar charts -->
      <aside class="rail dd-u-1-1 dd-u-lg-8-24 l-box" aria-label="Summary and visualizations">
        <section class="dd-section" aria-labelledby="summary-label">
          <div class="dd-section__content">
            <h2 class="dd-section__title l-box" id="summary-label">Summary</h2>
            <div class="dd-section__items dd-g">
              <div class="dd-section__item dd-u-1-1 l-box">
                <dl id="summary-grid" class="app-summary"></dl>
              </div>
            </div>
          </div>
        </section>

        <section class="dd-section" aria-labelledby="viz-label">
          <div class="dd-section__content">
            <h2 class="dd-section__title l-box" id="viz-label">Visualizations</h2>
            <div class="dd-section__items dd-g">
              <div class="dd-section__item dd-u-1-1 l-box">
                <div id="chart-grid" class="app-charts"></div>
              </div>
            </div>
          </div>
        </section>
      </aside>

      <!-- Canvas: the comparison work surface -->
      <div class="dd-u-1-1 dd-u-lg-16-24 l-box">
        <section class="dd-section" id="comparison" tabindex="-1" aria-labelledby="comparison-label">
          <div class="dd-section__content">
            <h2 class="dd-section__title l-box" id="comparison-label">Field Comparison</h2>
            <div class="dd-section__items dd-g">
              <div class="dd-section__item dd-u-1-1 l-box">
                <div id="comparison-table"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="dd-section" id="detail" tabindex="-1" aria-labelledby="detail-label">
          <div class="dd-section__content">
            <h2 class="dd-section__title l-box" id="detail-label">Site Detail</h2>
            <div class="dd-section__items dd-g">
              <div class="dd-section__item dd-u-1-1 l-box">
                <label for="filter" class="visually-hidden">Filter rows by URL or any value</label>
                <input id="filter" type="search" placeholder="Filter rows (URL or any value)…" aria-controls="comparison-table detail-table">
                <button id="export-csv" type="button" class="dd-button -secondary" aria-controls="detail-table" aria-label="Download CSV">CSV</button>
                <button id="export-json" type="button" class="dd-button -secondary" aria-controls="detail-table" aria-label="Copy JSON to clipboard">Copy JSON</button>
                <div id="detail-table"></div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- contentinfo landmark must be OUTSIDE <main> -->
  <footer class="dd-footer dd-u-1-1">
    <div class="dd-g">
      <div class="dd-footer__copyright dd-u-1-1">
        <div class="l-box muted">Fields: <span id="field-list"></span></div>
      </div>
    </div>
  </footer>

  <script type="application/json" id="dashboard-data">__DASHBOARD_DATA_JSON__</script>
  <script>
    (function () {
      "use strict";

      const chartDefinitions = [
        ["response_time", "Response Time", "seconds"],
        ["page_size", "Page Size", "bytes"],
        ["total_page_load_size", "Total Page Load Size", "bytes"],
        ["resource_count", "Resource Count", "count"],
        ["js_file_count", "JS File Count", "count"],
        ["css_file_count", "CSS File Count", "count"],
        ["h1_count", "H1 Count", "count"],
        ["word_count", "Word Count (v1.1)", "count"],
        ["image_count", "Image Count", "count"],
        ["link_count", "Link Count", "count"]
      ];

      let dashboard, rows, fields;
      // Row registries so filtering hides rows in place (no tbody rebuild →
      // framework sort order and focused sort button both survive).
      let comparisonRows = [];   // { field, tr }
      let detailRows = [];       // { row, tr }
      let comparisonEmpty, detailEmpty;
      let announceTimer;

      // --- element helpers -----------------------------------------------
      function mk(tag, className, text, attrs) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (text != null && text !== "") el.textContent = text;
        if (attrs) for (const k in attrs) { if (attrs[k] != null) el.setAttribute(k, attrs[k]); }
        return el;
      }

      // dd-badge: meaning is carried by the label TEXT, not color alone (1.4.1).
      function badge(mod, label) {
        const span = mk("span", mod ? `dd-badge ${mod}` : "dd-badge");
        span.append(mk("span", "dd-badge__label", String(label)));
        return span;
      }

      function announce(message) {
        const status = document.getElementById("row-status");
        if (status) status.textContent = message;
      }

      // --- summary --------------------------------------------------------
      function renderSummary() {
        const successful = rows.filter((row) => row.status_code >= 200 && row.status_code < 400).length;
        const errors = rows.filter((row) => row.error && row.error !== "None").length;
        const timedRows = rows.filter((row) => typeof row.response_time === "number");
        const sizedRows = rows.filter((row) => typeof row.total_page_load_size === "number");
        const fastest = timedRows.length ? timedRows.slice().sort((a, b) => a.response_time - b.response_time)[0] : null;
        const largest = sizedRows.length ? sizedRows.slice().sort((a, b) => b.total_page_load_size - a.total_page_load_size)[0] : null;
        const items = [
          ["Websites Compared", String(rows.length)],
          ["Successful Responses", String(successful)],
          ["Fastest Homepage", fastest ? `${shortUrl(fastest.URL)} (${fastest.response_time.toFixed(2)}s)` : "N/A"],
          ["Largest Load", largest ? `${shortUrl(largest.URL)} (${formatBytes(largest.total_page_load_size)})` : "N/A"],
          ["Errors", String(errors)]
        ];
        const grid = document.getElementById("summary-grid");
        grid.innerHTML = "";
        items.forEach(([label, value]) => {
          const row = mk("div", "app-summary__row");
          row.append(mk("dt", "", label));
          row.append(mk("dd", "", value));
          grid.append(row);
        });
      }

      // --- charts (dd-bar-chart) -----------------------------------------
      function renderCharts() {
        const grid = document.getElementById("chart-grid");
        grid.innerHTML = "";
        chartDefinitions.forEach(([fieldName, title, unit], idx) => {
          const values = rows
            .map((row) => [row, row[fieldName]])
            .filter(([, value]) => typeof value === "number");
          if (!values.length) return;

          const capId = `chart-cap-${idx}`;
          const fig = mk("figure", "dd-bar-chart", "", { role: "group", "aria-labelledby": capId });
          fig.append(mk("figcaption", "dd-bar-chart__caption", title, { id: capId }));
          const list = mk("ul", "dd-bar-chart__list");
          const maxValue = Math.max(...values.map(([, value]) => value)) || 1;
          values.forEach(([row, value]) => {
            const percent = Math.max((value / maxValue) * 100, 1);
            const li = mk("li", "dd-bar-chart__row");
            li.append(mk("span", "dd-bar-chart__label", shortUrl(row.URL)));
            const track = mk("span", "dd-bar-chart__track", "", { "aria-hidden": "true" });
            const fill = mk("span", "dd-bar-chart__fill");
            fill.style.inlineSize = `${percent.toFixed(2)}%`;
            track.append(fill);
            li.append(track);
            li.append(mk("span", "dd-bar-chart__value", formatChartValue(value, unit)));
            list.append(li);
          });
          fig.append(list);
          grid.append(fig);
        });
        if (!grid.children.length) {
          grid.append(mk("p", "muted", "No numerical data available."));
        }
      }

      // Build a dd-data-table shell; returns { wrap, table }.
      function dataTable(caption, scrollLabel) {
        const wrap = mk("div", "dd-data-table");
        const scroll = mk("div", "dd-data-table__scroll", "", { "data-label": scrollLabel });
        const table = mk("table", "dd-data-table__table");
        table.append(mk("caption", "dd-data-table__caption visually-hidden", caption));
        scroll.append(table);
        wrap.append(scroll);
        return { wrap, table };
      }

      // Field Comparison: fields×sites matrix, built ONCE. Field names are row
      // headers (scope=row); short site URLs are column headers (scope=col);
      // the corner is a plain <th> (no scope). Not sortable → no buttons.
      function buildComparisonTable() {
        const container = document.getElementById("comparison-table");
        container.innerHTML = "";
        const { wrap, table } = dataTable(
          `Field-by-field comparison across ${rows.length} site${rows.length === 1 ? "" : "s"}`,
          "Field comparison across sites, scrollable"
        );
        const thead = mk("thead");
        const headRow = mk("tr");
        headRow.append(mk("th", "dd-data-table__th", "Field"));
        rows.forEach((row) => headRow.append(
          mk("th", "dd-data-table__th", shortUrl(row.URL), { scope: "col", title: row.URL })
        ));
        thead.append(headRow);
        table.append(thead);

        const tbody = mk("tbody");
        comparisonRows = [];
        fields.forEach((fieldName) => {
          const tr = mk("tr", "dd-data-table__row");
          tr.append(mk("th", "dd-data-table__td", fieldName, { scope: "row" }));
          rows.forEach((row) => appendDisplayCell(tr, fieldName, row[fieldName]));
          tbody.append(tr);
          comparisonRows.push({ field: fieldName, tr });
        });
        comparisonEmpty = mk("tr", "dd-data-table__row -empty", "", { hidden: "hidden" });
        comparisonEmpty.append(mk("td", "dd-data-table__td", "No fields match the filter.", { colspan: String(rows.length + 1) }));
        tbody.append(comparisonEmpty);
        table.append(tbody);
        container.append(wrap);
      }

      // Site Detail: one row per site. Sortable columns are native framework
      // <button class="dd-data-table__sort"> — main.min.js owns the sort +
      // aria-sort upkeep + scroll a11y. Built ONCE; filtering hides rows.
      function buildDetailTable() {
        const container = document.getElementById("detail-table");
        container.innerHTML = "";
        const { wrap, table } = dataTable(
          "Per-site detail for every measured field",
          "Site detail, scrollable"
        );
        const thead = mk("thead");
        const headRow = mk("tr");
        fields.forEach((fieldName) => {
          const th = mk("th", "dd-data-table__th", "", { scope: "col", "aria-sort": "none" });
          const btn = mk("button", "dd-data-table__sort", fieldName, { type: "button" });
          btn.append(mk("span", "dd-data-table__sort-ind", "", { "aria-hidden": "true" }));
          th.append(btn);
          headRow.append(th);
        });
        thead.append(headRow);
        table.append(thead);

        const tbody = mk("tbody");
        detailRows = [];
        rows.forEach((row) => {
          const tr = mk("tr", "dd-data-table__row");
          fields.forEach((fieldName, i) => {
            if (i === 0) {
              const th = mk("th", "dd-data-table__td", formatDisplayValue(fieldName, row[fieldName]), { scope: "row" });
              tr.append(th);
            } else {
              appendDisplayCell(tr, fieldName, row[fieldName]);
            }
          });
          tbody.append(tr);
          detailRows.push({ row, tr });
        });
        detailEmpty = mk("tr", "dd-data-table__row -empty", "", { hidden: "hidden" });
        detailEmpty.append(mk("td", "dd-data-table__td", "No sites match the filter.", { colspan: String(fields.length) }));
        tbody.append(detailEmpty);
        table.append(tbody);
        container.append(wrap);

        // Announce sort changes (framework updates aria-sort + row order but
        // doesn't announce). Listener only announces — it never sorts, so it
        // cannot conflict with dd_data_table's own handler.
        thead.addEventListener("click", (e) => {
          const btn = e.target.closest(".dd-data-table__sort");
          if (!btn) return;
          const th = btn.closest("th");
          setTimeout(() => {
            const dir = th.getAttribute("aria-sort");
            if (dir && dir !== "none") announce(`Sorted by ${btn.textContent.trim()}, ${dir}`);
          }, 0);
        });
      }

      function appendDisplayCell(rowElement, fieldName, value) {
        const cell = mk("td", "dd-data-table__td");
        if (fieldName === "status_code") {
          cell.append(statusBadge(value));
        } else if (["mobile_responsive", "has_favicon", "has_canonical", "redirected"].includes(fieldName)) {
          const boolVal = (value === true || value === "true");
          cell.append(badge(boolVal ? "-pass" : "-critical", boolVal ? "Yes" : "No"));
        } else if (["trackers", "technologies", "keywords"].includes(fieldName)) {
          cell.append(renderPills(value));
        } else {
          cell.textContent = formatDisplayValue(fieldName, value);
        }
        rowElement.append(cell);
      }

      // A real list so screen readers enumerate the tags; "None detected" text
      // when empty (not an empty list).
      function renderPills(arr) {
        if (!Array.isArray(arr) || !arr.length) return document.createTextNode("None detected");
        const list = mk("ul", "app-pill-list");
        arr.forEach((v) => {
          const li = mk("li");
          li.append(badge("", String(v)));
          list.append(li);
        });
        return list;
      }

      // --- filtering (hide rows in place) --------------------------------
      function applyFilter(rawQ) {
        const q = (rawQ || "").toLowerCase().trim();
        let fieldsShown = 0;
        comparisonRows.forEach(({ field, tr }) => {
          const hay = (field + " " + rows.map((r) => formatDisplayValue(field, r[field])).join(" ")).toLowerCase();
          const match = !q || hay.includes(q);
          tr.hidden = !match;
          if (match) fieldsShown++;
        });
        if (comparisonEmpty) comparisonEmpty.hidden = fieldsShown !== 0;

        let sitesShown = 0;
        detailRows.forEach(({ row, tr }) => {
          const match = !q || fields.some((f) => String(formatDisplayValue(f, row[f]) || "").toLowerCase().includes(q));
          tr.hidden = !match;
          if (match) sitesShown++;
        });
        if (detailEmpty) detailEmpty.hidden = sitesShown !== 0;

        clearTimeout(announceTimer);
        announceTimer = setTimeout(() => {
          if (!q) { announce(""); return; }
          if (!fieldsShown && !sitesShown) { announce("No matching rows"); return; }
          announce(`${fieldsShown} of ${fields.length} fields, ${sitesShown} of ${rows.length} sites match`);
        }, 400);
      }

      function wireFilterAndExports() {
        const filter = document.getElementById("filter");
        if (filter) filter.addEventListener("input", () => applyFilter(filter.value));

        const csvBtn = document.getElementById("export-csv");
        if (csvBtn) csvBtn.addEventListener("click", exportCSV);

        const jsonBtn = document.getElementById("export-json");
        if (jsonBtn) jsonBtn.addEventListener("click", () => {
          const payload = JSON.stringify({ generated_at: dashboard.generated_at, results: rows }, null, 2);
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(payload)
              .then(() => announce("Comparison JSON copied to clipboard"))
              .catch(() => { announce("Copy failed — showing JSON in a prompt"); prompt("JSON:", payload); });
          } else {
            announce("Copy not supported — showing JSON in a prompt");
            prompt("JSON:", payload);
          }
        });
      }

      // --- formatting (unchanged behavior) -------------------------------
      function formatDisplayValue(fieldName, value) {
        if (fieldName === "response_time") return typeof value === "number" ? `${value.toFixed(2)} seconds` : "N/A";
        if (fieldName === "page_size" || fieldName === "total_page_load_size") return formatBytes(value);
        if (fieldName === "largest_item") return value ? `${shortUrl(value.url || "N/A")} (${formatBytes(value.bytes)})` : "N/A";
        if (["trackers", "technologies", "keywords"].includes(fieldName)) return Array.isArray(value) && value.length ? value.join(", ") : "None detected";
        if (fieldName === "final_url" || fieldName === "URL") return value || "N/A";
        if (fieldName === "error") return value || "None";
        if (value === null || value === undefined || value === "") return "N/A";
        if (typeof value === "boolean") return value ? "Yes" : "No";
        return String(value);
      }

      function statusBadge(value) {
        if (value === null || value === undefined) return badge("", "N/A");
        const code = Number(value);
        let mod = "";
        if (code >= 200 && code < 300) mod = "-pass";
        else if (code >= 300 && code < 400) mod = "-warning";
        else if (!Number.isNaN(code)) mod = "-critical";
        return badge(mod, String(value));
      }

      function formatBytes(value) {
        if (!Number.isInteger(value)) return "N/A";
        const units = ["bytes", "KB", "MB", "GB"];
        let amount = value;
        let unit = units[0];
        for (const candidateUnit of units) {
          unit = candidateUnit;
          if (amount < 1024 || unit === units[units.length - 1]) break;
          amount /= 1024;
        }
        return unit === "bytes" ? `${value} bytes` : `${amount.toFixed(2)} ${unit} (${value} bytes)`;
      }

      function formatChartValue(value, unit) {
        if (unit === "seconds") return `${value.toFixed(2)}s`;
        if (unit === "bytes") return formatBytes(Math.round(value)).split(" (")[0];
        return String(Math.round(value));
      }

      function shortUrl(url) {
        try {
          const parsed = new URL(url);
          const path = parsed.pathname.replace(/\/$/, "");
          return path ? `${parsed.host}${path}` : parsed.host;
        } catch (_error) {
          return url;
        }
      }

      function exportCSV() {
        const header = fields;
        const lines = [header.join(",")];
        rows.forEach((row) => {
          const vals = header.map((f) => {
            let v = row[f];
            if (Array.isArray(v)) v = v.join("; ");
            if (v && typeof v === "object") v = JSON.stringify(v);
            v = (v == null ? "" : String(v)).replace(/"/g, '""');
            if (/[,"\n]/.test(v)) v = `"${v}"`;
            return v;
          });
          lines.push(vals.join(","));
        });
        const blob = new Blob([lines.join("\n")], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "site_comparison.csv";
        a.click();
        URL.revokeObjectURL(a.href);
      }

      // --- init (guarded so a data/render failure can't blank the page) ---
      try {
        dashboard = JSON.parse(document.getElementById("dashboard-data").textContent);
        rows = dashboard.results || [];
        fields = dashboard.field_order || [];
        document.getElementById("generated-at").textContent = dashboard.generated_at || "unknown";
        document.getElementById("field-list").textContent = fields.join(", ");
        renderSummary();
        renderCharts();
        buildComparisonTable();
        buildDetailTable();
        wireFilterAndExports();
      } catch (err) {
        const box = document.getElementById("app-error");
        if (box) {
          box.hidden = false;
          box.textContent = "The comparison data could not be rendered. The raw data is available in data.json. (" + (err && err.message ? err.message : err) + ")";
        }
      }
    })();
  </script>
</body>

</html>
